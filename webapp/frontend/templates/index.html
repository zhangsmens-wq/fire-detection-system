<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧火灾监测系统</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --primary-red: #e74c3c; --dark-bg: #2c3e50; --card-bg: #34495e;
            --text-light: #ecf0f1; --text-dark: #bdc3c7; --accent-green: #2ecc71;
            --hover-light: #4a6682; --border-color: rgba(255, 255, 255, 0.1);
            --shadow-dark: 0 8px 25px rgba(0, 0, 0, 0.4); --video-blue: #3498db;
        }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; background: var(--dark-bg); color: var(--text-light); line-height: 1.6; display: flex; flex-direction: column; min-height: 100vh; }
        .header { background: var(--card-bg); padding: 25px 30px; text-align: center; border-bottom: 1px solid var(--border-color); box-shadow: var(--shadow-dark); position: relative; z-index: 100; }
        .header h1 { margin: 0; font-size: 2.5em; color: var(--primary-red); font-weight: 700; letter-spacing: 1px; display: inline-block; vertical-align: middle; }
        .header h1 i { margin-right: 10px; font-size: 0.9em; }
        .user-info { position: absolute; top: 25px; right: 30px; font-size: 1.1em; color: var(--text-light); }
        .user-info a { color: var(--primary-red); text-decoration: none; margin-left: 10px; transition: color 0.3s ease; }
        .user-info a:hover { color: var(--text-light); }
        .history-link { display: block; margin-top: 10px; font-size: 0.9em; color: var(--text-dark); text-decoration: none; transition: color 0.3s ease; }
        .history-link:hover { color: var(--text-light); text-decoration: underline; }
        main { flex-grow: 1; padding: 30px; max-width: 1200px; margin: 0 auto; width: 100%; }
        .tab-buttons { display: flex; justify-content: center; margin-bottom: 40px; gap: 15px; flex-wrap: wrap; }
        .tab-button { padding: 12px 30px; border: none; background: var(--card-bg); color: var(--text-light); cursor: pointer; border-radius: 8px; font-weight: bold; font-size: 1.1em; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2); }
        .tab-button i { margin-right: 8px; }
        .tab-button:hover { background: var(--hover-light); transform: translateY(-3px); box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3); }
        .tab-button.active { background: var(--primary-red); color: white; transform: translateY(-3px) scale(1.02); box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4); border: 1px solid rgba(255,255,255,0.2); }
        .form-section { background: var(--card-bg); border-radius: 15px; padding: 30px; margin-bottom: 30px; box-shadow: var(--shadow-dark); display: none; animation: fadeIn 0.6s ease-out forwards; border: 1px solid var(--border-color); }
        .active-section { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .form-section form { display: flex; gap: 15px; flex-wrap: wrap; align-items: center; margin-bottom: 25px; border-bottom: 1px dashed var(--border-color); padding-bottom: 25px; }
        .form-section input[type="file"] { flex-grow: 1; padding: 10px; background: var(--dark-bg); border: 1px solid var(--border-color); border-radius: 8px; color: var(--text-light); font-size: 1em; cursor: pointer; }
        .form-section input[type="file"]::-webkit-file-upload-button { background: var(--primary-red); color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; transition: background 0.3s ease; }
        .form-section input[type="file"]::-webkit-file-upload-button:hover { background: var(--hover-light); }
        .action-btn { background: var(--primary-red); color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1em; transition: all 0.3s ease; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2); }
        .action-btn:hover { background: var(--hover-light); transform: translateY(-2px); box-shadow: 0 6px 15px rgba(0, 0, 0, 0.3); }
        .monitor-wrapper { width: 100%; max-width: 900px; margin: 20px auto; background: #000; border-radius: 12px; position: relative; overflow: hidden; border: 2px solid var(--border-color); box-shadow: var(--shadow-dark); min-height: 300px; display: flex; align-items: center; justify-content: center; }
        .stream-img { width: 100%; max-height: 550px; object-fit: contain; display: block; }
        .live-tag { position: absolute; top: 15px; left: 15px; background: var(--primary-red); color: white; padding: 6px 12px; border-radius: 5px; font-size: 0.9em; font-weight: bold; animation: pulse 1.5s infinite; box-shadow: 0 0 10px rgba(231, 76, 60, 0.5); z-index: 10; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.05); opacity: 0.8; } 100% { transform: scale(1); opacity: 1; } }
        .status-box { padding: 15px; border-radius: 10px; text-align: center; font-weight: bold; font-size: 1.1em; border: 1px solid var(--border-color); margin: 0; }
        .status-box.safe { background: rgba(46, 204, 113, 0.2); color: var(--accent-green); }
        .status-box.alert { background: rgba(231, 76, 60, 0.2); color: var(--primary-red); }
        .status-box.idle { background: rgba(189, 195, 199, 0.1); color: var(--text-dark); }
        .control-bar { display: flex; justify-content: center; align-items: center; gap: 20px; margin: 25px 0; padding: 15px; background: rgba(0,0,0,0.2); border-radius: 12px; border: 1px dashed var(--border-color); }
        #main-video { width: 100%; max-width: 700px; border-radius: 10px; background: #000; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; margin-top: 30px; }
        .img-box { background: var(--card-bg); border-radius: 10px; overflow: hidden; border: 1px solid var(--border-color); cursor: pointer; transition: all 0.3s ease; }
        .img-box:hover { transform: translateY(-5px); border-color: var(--primary-red); }
        .img-box img { width: 100%; height: 180px; object-fit: cover; display: block; }
        .modal { display: none; position: fixed; z-index: 9999; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(5px); align-items: center; justify-content: center; }
        .modal img { max-width: 90%; max-height: 85%; border-radius: 10px; }
    </style>
</head>
<body>
    <header class="header">
        <div class="user-info">
            <i class="fas fa-user-circle"></i> 欢迎, {{ user }}！
            <a href="/logout"><i class="fas fa-sign-out-alt"></i> 退出</a>
        </div>
        <h1><i class="fas fa-fire-extinguisher"></i> 智慧火灾监测系统</h1>
        <a href="/history" class="history-link"><i class="fas fa-history"></i> 查看历史报警记录</a>

        <div id="model-selector" style="margin-top:12px; display:flex; align-items:center; justify-content:center; gap:10px; flex-wrap:wrap;">
            <label style="color:var(--text-dark); font-size:0.95em;"><i class="fas fa-brain"></i> 当前模型：</label>
            <select id="model-select" onchange="switchModel(this.value)"
                style="background:var(--dark-bg); color:var(--text-light); border:1px solid var(--border-color);
                       border-radius:6px; padding:6px 12px; font-size:0.95em; cursor:pointer; min-width:180px;">
                <option disabled>加载中...</option>
            </select>
            <span id="model-status" style="font-size:0.85em; color:var(--text-dark);"></span>
        </div>
    </header>

    <main>
        <div class="tab-buttons">
            <button class="tab-button" id="btn-image" onclick="showSection('image-section')"><i class="fas fa-image"></i> 图片检测</button>
            <button class="tab-button" id="btn-video" onclick="showSection('video-section')"><i class="fas fa-video"></i> 视频检测</button>
            <button class="tab-button" id="btn-camera" onclick="showSection('camera-section')"><i class="fas fa-camera"></i> 实时监控</button>
        </div>

        <div id="image-section" class="form-section">
            <form action="/detect/image" method="post" enctype="multipart/form-data">
                <input type="file" name="images" multiple required>
                <button type="submit" class="action-btn"><i class="fas fa-play-circle"></i> 开始批量检测</button>
            </form>
            <div class="gallery">
                {% if results_list %}
                {% for item in results_list %}
                <div class="img-box" onclick="openFullImage('/static/results/{{ item.result_img }}')">
                    <img src="/static/results/{{ item.result_img }}" style="{{ 'border: 3px solid #e74c3c;' if item.has_fire else '' }}">
                    {% if item.has_fire %}
                    <p style="color: #e74c3c; text-align: center; font-weight: bold; margin: 5px 0;">🔥 发现异常</p>
                    {% endif %}
                </div>
                {% endfor %}
                {% else %}
                <p style="text-align:center; color:var(--text-dark); width:100%;">等待上传检测...</p>
                {% endif %}
            </div>
        </div>

        <div id="video-section" class="form-section">
            <form action="/analyze/video" method="post" enctype="multipart/form-data">
                <input type="file" name="video" required>
                <button type="submit" class="action-btn"><i class="fas fa-upload"></i> 上传视频</button>
            </form>
            {% if video_to_detect %}
            <div class="monitor-wrapper" style="position: relative; background: #000; border-radius: 12px; overflow: hidden;">
                <div class="live-tag"><i class="fas fa-microchip"></i> AI 交互分析模式</div>
                <video id="main-video" controls style="width: 100%; display: block;">
                    <source src="{{ url_for('static', filename='uploads/videos/' + video_to_detect) }}" type="video/mp4">
                </video>
                <canvas id="detection-canvas" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5;"></canvas>
            </div>
            <div class="control-bar" style="margin-top: 15px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap;">
                <button id="ai-detect-btn" class="action-btn" onclick="toggleAIDetection()" style="background: var(--accent-green);">
                    <i class="fas fa-robot"></i> 开始 AI 检测
                </button>
                <div id="video-status" class="status-box idle">
                    <i class="fas fa-circle-info"></i> 等待开启检测
                </div>
            </div>
            {% endif %}
        </div>

        <div id="camera-section" class="form-section">
            <div style="text-align: center; margin-bottom: 20px;">
                <button class="action-btn" style="background:var(--accent-green);" onclick="toggleCamera(true)"><i class="fas fa-play"></i> 开启实时监测</button>
                <button class="action-btn" style="background:#6c757d;" onclick="toggleCamera(false)"><i class="fas fa-stop"></i> 关闭设备</button>
            </div>
            <div class="monitor-wrapper" style="position:relative;">
                <div id="cam-tag" class="live-tag" style="display:none"><i class="fas fa-broadcast-tower"></i> LIVE</div>
                <img id="camera-img" class="stream-img" style="display:none; border-radius:12px;">
                <div id="cam-placeholder" class="cam-placeholder" style="color:#bdc3c7;">
                    <i class="fas fa-camera fa-3x" style="margin-bottom:10px;"></i><br><p>设备待机中...</p>
                </div>
            </div>
            <div id="camera-status" class="status-box idle" style="margin-top:20px;">等待指令</div>
        </div>
    </main>

    <div id="imageModal" class="modal" onclick="this.style.display='none'">
        <img id="imgFull" src="">
    </div>

<script>
    // 恢复全局警报声音对象
    const alarmAudio = new Audio('/static/jingbao.mp3');
    alarmAudio.loop = true;

    if (Notification.permission !== "granted") Notification.requestPermission();
    let statusInterval;

    function showSection(id) {
        document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active-section'));
        document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active-section');
        document.getElementById('btn-' + id.split('-')[0]).classList.add('active');
        if (id !== 'camera-section') toggleCamera(false);

        // 新增逻辑：只有点击实时监控时，自动切换至 v8n
        if (id === 'camera-section') {
            const targetModel = "best-v8n.pt";
            const modelSelect = document.getElementById('model-select');
            if (modelSelect && modelSelect.value !== targetModel) {
                const hasModel = Array.from(modelSelect.options).some(opt => opt.value === targetModel);
                if (hasModel) {
                    modelSelect.value = targetModel;
                    switchModel(targetModel);
                    const statusEl = document.getElementById('model-status');
                    if (statusEl) {
                        statusEl.style.color = 'var(--accent-green)';
                        statusEl.textContent = '⚡ 实时模式：自动应用轻量化模型';
                        setTimeout(() => { statusEl.textContent = ''; }, 3000);
                    }
                }
            }
        }
    }

    function openFullImage(src) {
        document.getElementById('imageModal').style.display = 'flex';
        document.getElementById('imgFull').src = src;
    }

    let lastLiveNotifyTime = 0;
    let isCameraRunning = false;

    // --- 实时摄像头逻辑 ---
    function toggleCamera(on) {
        const img = document.getElementById('camera-img');
        const placeholder = document.getElementById('cam-placeholder');
        const tag = document.getElementById('cam-tag');
        const status = document.getElementById('camera-status');

        if (on) {
            if (isCameraRunning) return;
            isCameraRunning = true;

            img.src = "/camera_feed?t=" + Date.now();
            img.style.display = "block";
            placeholder.style.display = "none";
            tag.style.display = "block";

            if (statusInterval) clearInterval(statusInterval);
            statusInterval = setInterval(() => {
                fetch('/check_status/live_camera').then(r => r.json()).then(data => {
                    const now = Date.now();

                    if (data.status === 'critical' || data.status === 'alert') {
                        if (data.status === 'critical') {
                            status.innerHTML = '<i class="fas fa-biohazard"></i> 💀 紧急：火势巨大！！';
                        } else {
                            status.innerHTML = '<i class="fas fa-exclamation-circle"></i> 🔥 警报：火情！';
                        }
                        status.className = 'status-box alert';

                        // 恢复实时监控下的警报声
                        if (alarmAudio.paused) {
                            alarmAudio.play().catch(e => console.log("等待用户交互以播放音频"));
                        }

                        if (now - lastLiveNotifyTime > 10000) {
                            if (Notification.permission === "granted") {
                                new Notification("🚨 紧急警报", { body: "实时监控发现持续火情！", requireInteraction: true });
                            }
                            lastLiveNotifyTime = now;
                        }
                    } else {
                        status.innerHTML = '<i class="fas fa-shield-alt"></i> 🟢 监控中';
                        status.className = 'status-box safe';

                        // 安全时停止警报声
                        if (!alarmAudio.paused) {
                            alarmAudio.pause();
                            alarmAudio.currentTime = 0;
                        }
                    }
                }).catch(e=>{});
            }, 1000);

        } else {
            if (!isCameraRunning) return;
            isCameraRunning = false;

            img.src = "";
            img.style.display = "none";
            placeholder.style.display = "block";
            tag.style.display = "none";
            if (statusInterval) clearInterval(statusInterval);

            // 关闭设备时停止警报声
            if (!alarmAudio.paused) {
                alarmAudio.pause();
                alarmAudio.currentTime = 0;
            }

            status.innerHTML = '<i class="fas fa-power-off"></i> ⚪ 已停机';
            status.className = 'status-box idle';
            alert('✅ 摄像头已关闭，录像已瞬间保存至 results/videos 目录！');
        }
    }

    // --- 本地视频检测逻辑 ---
    let videoDetectActive = false;
    let detectionTimer   = null;
    let videoNotifySent  = false;
    let lastVideoNotifyTime = 0;
    const VIDEO_FILENAME = "{{ video_to_detect }}";

    let pinnedBoxes = [];
    let pinTimeout = null;
    let animationId = null;

    function toggleAIDetection() {
        if (!videoDetectActive) startAIDetection();
        else stopAndSaveAIDetection();
    }

    async function startAIDetection() {
        videoDetectActive = true;
        videoNotifySent   = false;
        pinnedBoxes = [];

        const btn    = document.getElementById('ai-detect-btn');
        const status = document.getElementById('video-status');
        btn.style.background = '#e74c3c';
        btn.innerHTML = '<i class="fas fa-stop-circle"></i> 停止检测并保存';
        status.className = 'status-box safe';
        status.innerHTML = '🤖 AI 正在实时分析...';

        const video = document.getElementById('main-video');
        const canvas = document.getElementById('detection-canvas');

        await fetch('/start_background_video', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ filename: VIDEO_FILENAME, currentTime: video.currentTime })
        });

        renderPinnedBoxes();

        // 30ms 轮询保证丝滑
        detectionTimer = setInterval(() => {
            if (!video.paused && !video.ended) {
                canvas.width  = video.videoWidth;
                canvas.height = video.videoHeight;

                const tmp = document.createElement('canvas');
                tmp.width  = video.videoWidth;
                tmp.height = video.videoHeight;
                tmp.getContext('2d').drawImage(video, 0, 0);

                analyzeVideoFrame(tmp.toDataURL('image/jpeg', 0.4));
            }
        }, 30);

        video.addEventListener('ended', stopAndSaveAIDetection, { once: true });
    }

    async function analyzeVideoFrame(base64Image) {
        if (isRequesting) return;
        isRequesting = true;

        try {
            const response = await fetch('/analyze_frame', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ image: base64Image })
            });
            const data = await response.json();

            if (videoDetectActive && data.boxes && data.boxes.length > 0) {
                pinnedBoxes = data.boxes;

                const status = document.getElementById('video-status');
                status.className = 'status-box alert';
                status.innerHTML = '🚨 追踪到火情！';

                if(pinTimeout) clearTimeout(pinTimeout);
                pinTimeout = setTimeout(() => {
                    pinnedBoxes = [];
                    status.className = 'status-box safe';
                    status.innerHTML = '✅ 画面安全';
                }, 1500);

                const now = Date.now();
                if (!videoNotifySent || now - lastVideoNotifyTime > 30000) {
                    if (Notification.permission === "granted")
                        new Notification("🚨 视频检测到火情！", { body: "AI 已锁定画面。" });

                    videoNotifySent = true;
                    lastVideoNotifyTime = now;
                }
            }
        } catch(e) { console.error(e); }
        isRequesting = false;
    }

    async function stopAndSaveAIDetection() {
        videoDetectActive = false;
        if (detectionTimer) { clearInterval(detectionTimer); detectionTimer = null; }
        if (animationId) { cancelAnimationFrame(animationId); animationId = null; }

        const canvas = document.getElementById('detection-canvas');
        if (canvas) canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);

        const btn    = document.getElementById('ai-detect-btn');
        const status = document.getElementById('video-status');

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 正在保存视频...';
        status.className = 'status-box idle';
        status.innerHTML = '<i class="fas fa-hourglass-half"></i> 正在处理并保存，请稍候...';

        try {
            await fetch('/stop_background_video', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ filename: VIDEO_FILENAME })
            });
        } catch(e) {}

        const poll = setInterval(async () => {
            try {
                const res  = await fetch('/video_save_status?filename=' + encodeURIComponent(VIDEO_FILENAME));
                const data = await res.json();
                if (data.done) {
                    clearInterval(poll);
                    btn.disabled  = false;
                    btn.style.background = 'var(--accent-green)';
                    btn.innerHTML = '<i class="fas fa-robot"></i> 开始 AI 检测';
                    status.className = 'status-box safe';
                    status.innerHTML = '✅ 视频保存完毕！';
                    alert('✅ 视频保存成功！');
                }
            } catch(e) {
                clearInterval(poll);
                btn.disabled  = false;
                btn.innerHTML = '<i class="fas fa-robot"></i> 开始 AI 检测';
            }
        }, 800);
    }

    function renderPinnedBoxes() {
        if(!videoDetectActive) return;
        const canvas = document.getElementById('detection-canvas');
        if(!canvas) return;
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 颜色改为完全匹配 OpenCV 的黄色 (#FFFF00)
        const classColors = { fire: '#FFFF00', smoke: '#FF0000' };
        pinnedBoxes.forEach(box => {
            const [x1, y1, x2, y2] = box.bbox;
            const color = classColors[box.cls] || '#FFFF00';
            const label = `${box.cls || 'fire'} ${box.conf.toFixed(2)}`;

            ctx.strokeStyle = color;
            ctx.lineWidth = 2;
            ctx.strokeRect(x1, y1, x2 - x1, y2 - y1);

            ctx.font = 'bold 14px Arial';
            const tw = ctx.measureText(label).width;

            ctx.fillStyle = color;
            ctx.fillRect(x1, y1 - 20, tw + 4, 20);

            ctx.fillStyle = '#000000';
            ctx.fillText(label, x1 + 2, y1 - 5);
        });

        animationId = requestAnimationFrame(renderPinnedBoxes);
    }

    let isRequesting = false;

    // --- 模型选择逻辑 ---
    async function loadModelList() {
        try {
            const res = await fetch('/models');
            const data = await res.json();
            const sel = document.getElementById('model-select');
            sel.innerHTML = '';
            data.models.forEach(name => {
                const opt = document.createElement('option');
                opt.value = name;
                opt.textContent = name;
                if (name === data.current) opt.selected = true;
                sel.appendChild(opt);
            });
            if (data.models.length === 0) {
                sel.innerHTML = '<option disabled>暂无可用模型</option>';
            }
        } catch(e) {
            document.getElementById('model-select').innerHTML = '<option disabled>加载失败</option>';
        }
    }

    async function switchModel(modelName) {
        const statusEl = document.getElementById('model-status');
        const sel = document.getElementById('model-select');
        statusEl.style.color = 'var(--text-dark)';
        statusEl.textContent = '⏳ 切换中...';
        sel.disabled = true;
        try {
            const res = await fetch('/switch_model', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ model_name: modelName })
            });
            const data = await res.json();
            if (data.success) {
                statusEl.style.color = 'var(--accent-green)';
                statusEl.textContent = '✅ 切换成功';
            } else {
                statusEl.style.color = 'var(--primary-red)';
                statusEl.textContent = '❌ ' + (data.error || '切换失败');
                await loadModelList(); // 恢复选中项
            }
        } catch(e) {
            statusEl.style.color = 'var(--primary-red)';
            statusEl.textContent = '❌ 请求失败';
        }
        sel.disabled = false;
        setTimeout(() => { statusEl.textContent = ''; }, 3000);
    }

    window.onload = () => {
        loadModelList();
        const currentShow = "{{ show }}";
        showSection(currentShow === "video" ? 'video-section' : 'image-section');
    };
</script>
